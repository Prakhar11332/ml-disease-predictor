<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heart Disease Prediction</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            background: #fff;
            border-radius: 14px;
            padding: 30px 40px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #777;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }

        .field label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 5px;
        }

        .field input,
        .field select {
            width: 100%;
            padding: 9px 11px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .field input:focus,
        .field select:focus {
            outline: none;
            border-color: #667eea;
        }

        .hint {
            font-size: 11px;
            color: #999;
            margin-top: 3px;
        }

        button {
            margin-top: 25px;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            display: none;
            text-align: center;
            animation: fadeIn 0.4s;
        }

        .result.positive {
            background: #ffe5e5;
            border: 2px solid #e74c3c;
        }

        .result.negative {
            background: #e8f8ec;
            border: 2px solid #27ae60;
        }

        .result.error {
            background: #fff3cd;
            border: 2px solid #f0ad4e;
        }

        .result h2 {
            margin-bottom: 8px;
        }

        .result p {
            color: #555;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>❤️ Heart Disease Prediction</h1>
        <p class="subtitle">Enter patient data below — model trained on the Kaggle heart.csv dataset</p>

        <form id="predictForm">
            <div class="grid">
                <div class="field">
                    <label>Age</label>
                    <input type="number" name="age" min="1" max="120" required />
                    <div class="hint">Years (e.g. 54)</div>
                </div>

                <div class="field">
                    <label>Sex</label>
                    <select name="sex" required>
                        <option value="">Select</option>
                        <option value="1">Male</option>
                        <option value="0">Female</option>
                    </select>
                </div>

                <div class="field">
                    <label>Chest Pain Type (cp)</label>
                    <select name="cp" required>
                        <option value="">Select</option>
                        <option value="0">0 — Typical Angina</option>
                        <option value="1">1 — Atypical Angina</option>
                        <option value="2">2 — Non-anginal Pain</option>
                        <option value="3">3 — Asymptomatic</option>
                    </select>
                </div>

                <div class="field">
                    <label>Resting BP (trestbps)</label>
                    <input type="number" name="trestbps" min="80" max="220" required />
                    <div class="hint">mm Hg (e.g. 130)</div>
                </div>

                <div class="field">
                    <label>Cholesterol (chol)</label>
                    <input type="number" name="chol" min="100" max="600" required />
                    <div class="hint">mg/dl (e.g. 246)</div>
                </div>

                <div class="field">
                    <label>Fasting Blood Sugar &gt; 120 (fbs)</label>
                    <select name="fbs" required>
                        <option value="">Select</option>
                        <option value="1">True</option>
                        <option value="0">False</option>
                    </select>
                </div>

                <div class="field">
                    <label>Resting ECG (restecg)</label>
                    <select name="restecg" required>
                        <option value="">Select</option>
                        <option value="0">0 — Normal</option>
                        <option value="1">1 — ST-T abnormality</option>
                        <option value="2">2 — LV hypertrophy</option>
                    </select>
                </div>

                <div class="field">
                    <label>Max Heart Rate (thalach)</label>
                    <input type="number" name="thalach" min="60" max="220" required />
                    <div class="hint">bpm (e.g. 150)</div>
                </div>

                <div class="field">
                    <label>Exercise Angina (exang)</label>
                    <select name="exang" required>
                        <option value="">Select</option>
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>

                <div class="field">
                    <label>ST Depression (oldpeak)</label>
                    <input type="number" name="oldpeak" step="0.1" min="0" max="10" required />
                    <div class="hint">e.g. 1.4</div>
                </div>

                <div class="field">
                    <label>Slope</label>
                    <select name="slope" required>
                        <option value="">Select</option>
                        <option value="0">0 — Upsloping</option>
                        <option value="1">1 — Flat</option>
                        <option value="2">2 — Downsloping</option>
                    </select>
                </div>

                <div class="field">
                    <label>Major Vessels (ca)</label>
                    <select name="ca" required>
                        <option value="">Select</option>
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                    </select>
                </div>

                <div class="field">
                    <label>Thalassemia (thal)</label>
                    <select name="thal" required>
                        <option value="">Select</option>
                        <option value="0">0 — Null</option>
                        <option value="1">1 — Fixed defect</option>
                        <option value="2">2 — Normal</option>
                        <option value="3">3 — Reversible defect</option>
                    </select>
                </div>
            </div>

            <button type="submit" id="submitBtn">🔍 Predict</button>
        </form>

        <div id="result" class="result"></div>
    </div>

    <script>
        const API_URL = "http://localhost:5000/predict";
        const form = document.getElementById("predictForm");
        const resultBox = document.getElementById("result");
        const submitBtn = document.getElementById("submitBtn");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            resultBox.style.display = "none";
            submitBtn.disabled = true;
            submitBtn.textContent = "Predicting...";

            const formData = new FormData(form);
            const payload = {};
            formData.forEach((v, k) => {
                payload[k] = (k === "oldpeak") ? parseFloat(v) : parseInt(v);
            });

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) throw new Error(`Server returned ${res.status}`);
                const data = await res.json();

                // Expecting { prediction: 0|1, probability: float (optional) }
                const pred = data.prediction;
                const prob = data.probability != null
                    ? ` (Confidence: ${(data.probability * 100).toFixed(1)}%)`
                    : "";

                if (pred === 1) {
                    resultBox.className = "result positive";
                    resultBox.innerHTML = `<h2>⚠️ High Risk Detected</h2>
          <p>The model predicts the presence of heart disease.${prob}</p>
          <p><small>Please consult a medical professional.</small></p>`;
                } else {
                    resultBox.className = "result negative";
                    resultBox.innerHTML = `<h2>✅ Low Risk</h2>
          <p>The model predicts no heart disease.${prob}</p>
          <p><small>This is not a medical diagnosis.</small></p>`;
                }
            } catch (err) {
                resultBox.className = "result error";
                resultBox.innerHTML = `<h2>⚠️ Error</h2>
        <p>${err.message}</p>
        <p><small>Make sure your Flask API is running at ${API_URL}</small></p>`;
            } finally {
                resultBox.style.display = "block";
                submitBtn.disabled = false;
                submitBtn.textContent = "🔍 Predict";
            }
        });
    </script>
</body>

</html>
